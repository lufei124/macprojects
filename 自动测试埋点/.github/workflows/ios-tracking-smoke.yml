name: ios-tracking-smoke

on:
  workflow_dispatch:
    inputs:
      tracking_env:
        description: "tracking env (test/uat)"
        required: true
        default: "uat"
      case_id:
        description: "optional case id"
        required: false
        default: ""
  schedule:
    - cron: "0 2 * * *"

jobs:
  smoke:
    runs-on: [self-hosted, macOS, ios]
    timeout-minutes: 20
    env:
      EVENT_BASE_URL: ${{ secrets.EVENT_BASE_URL }}
      TRACKING_DEVICE_ID: ${{ secrets.TRACKING_DEVICE_ID }}
      TRACKING_ENV: ${{ github.event.inputs.tracking_env || 'uat' }}
      APPIUM_SERVER_URL: ${{ secrets.APPIUM_SERVER_URL }}
      IOS_CAPABILITIES_JSON: ${{ secrets.IOS_CAPABILITIES_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r ios_automation/requirements.txt

      - name: Health check backend endpoint
        run: |
          python - <<'PY'
          import os, requests
          base = os.environ["EVENT_BASE_URL"].rstrip("/")
          r = requests.get(f"{base}/health", timeout=10)
          r.raise_for_status()
          print(r.text)
          PY

      - name: Run iOS tracking smoke
        run: |
          if [ -n "${{ github.event.inputs.case_id }}" ]; then
            python -m ios_automation.runner --cases ios_automation/cases.yaml --case-id "${{ github.event.inputs.case_id }}"
          else
            python -m ios_automation.runner --cases ios_automation/cases.yaml
          fi
