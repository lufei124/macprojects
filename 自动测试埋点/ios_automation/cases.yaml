cases:
  - id: cold_start_event
    description: 冷启动后应上报 game_start
    expect_event: game_start
    required_fields:
      - event_name
      - content.start_type
    timeout_sec: 25
    steps:
      - action: terminate_app
        bundle_id: com.example.game
      - action: activate_app
        bundle_id: com.example.game
      - action: wait_for
        by: accessibility_id
        value: HomeScreenLoaded
        timeout_sec: 20

  - id: start_button_click_event
    description: 点击开始按钮后应上报 button_click
    expect_event: button_click
    required_fields:
      - content.button_id
    timeout_sec: 20
    steps:
      - action: wait_for
        by: accessibility_id
        value: StartButton
        timeout_sec: 20
      - action: tap
        by: accessibility_id
        value: StartButton
        timeout_sec: 10

